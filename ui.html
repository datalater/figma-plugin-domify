<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Inter, system-ui, sans-serif; font-size: 12px; color: #333; padding: 12px; overflow-wrap: anywhere; }
  .section { margin-bottom: 16px; }
  .section-title { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .selected-node { padding: 8px; background: #f5f5f5; border-radius: 6px; margin-bottom: 8px; }
  .selected-node .name { font-weight: 600; font-size: 13px; }
  .selected-node .type { font-size: 11px; color: #888; }
  .selected-node .current-tag { margin-top: 4px; font-size: 11px; color: #0078FF; }
  .selected-node .actions { margin-top: 6px; }
  .btn-small { padding: 3px 8px; font-size: 10px; background: #f0f0f0; color: #555; border: 1px solid #ddd; border-radius: 3px; }
  .btn-small:hover { background: #e4e4e4; color: #333; }
  .tag-form { display: flex; gap: 6px; margin-bottom: 8px; }
  .tag-form input {
    flex: 1; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px;
    outline: none;
  }
  .tag-form input:focus { border-color: #0078FF; }
  button {
    padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer;
    font-weight: 500;
  }
  .btn-primary { background: #0078FF; color: white; }
  .btn-primary:hover { background: #0066DD; }
  .btn-primary:disabled { background: #ccc; cursor: default; }
  .btn-danger { background: none; color: #F44336; padding: 4px 8px; font-size: 11px; }
  .btn-danger:hover { background: #FEE; }
  .tag-list { display: flex; flex-direction: column; gap: 4px; }
  .tag-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 8px; background: #f9f9f9; border-radius: 4px; font-size: 12px;
  }
  .tag-item .node-name { color: #888; }
  .tag-item .component-name { font-weight: 600; color: #0078FF; }
  .tag-item .info { cursor: pointer; flex: 1; }
  .tag-item .info:hover .node-name { color: #0078FF; }
  .tag-item .remove { cursor: pointer; color: #ccc; font-size: 14px; flex-shrink: 0; }
  .tag-item .remove:hover { color: #F44336; }
  .tag-item.scoped { margin-left: 16px; border-left: 2px solid #0078FF; }
  .tag-item .scope-label { font-size: 10px; color: #999; margin-left: 4px; }
  .scope-row { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; font-size: 11px; color: #666; }
  .scope-row input[type="checkbox"] { margin: 0; }
  .scope-row label { cursor: pointer; user-select: none; }
  .scope-row .ancestor-name { color: #0078FF; font-weight: 600; }
  .scope-row.disabled { opacity: 0.4; pointer-events: none; }
  .tag-toolbar { display: flex; gap: 6px; margin-bottom: 8px; }
  .tag-toolbar input {
    flex: 1; padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px;
    outline: none;
  }
  .tag-toolbar input:focus { border-color: #0078FF; }
  .tag-toolbar select {
    padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px;
    background: #fff; color: #333; outline: none; cursor: pointer; flex-shrink: 0;
  }
  .tag-toolbar select:focus { border-color: #0078FF; }
  .tag-count { font-size: 10px; color: #bbb; font-weight: 400; margin-left: 4px; }
  .tag-group-header { font-size: 10px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.3px; padding: 6px 4px 2px; margin-top: 4px; border-bottom: 1px solid #eee; }
  .empty { color: #bbb; font-size: 11px; font-style: italic; padding: 8px 0; }
  .no-selection { color: #bbb; font-size: 12px; padding: 12px; text-align: center; }
</style>

<div id="app">
  <div class="section">
    <div class="section-title">Selected Node</div>
    <div id="selected-info" class="no-selection">Select a node in Figma</div>
  </div>

  <div class="section" id="tag-section" style="display:none">
    <div class="section-title">Component Tag</div>
    <div class="tag-form">
      <input id="tag-input" type="text" placeholder="e.g. TopHeader" />
      <button id="tag-btn" type="button" class="btn-primary">Tag</button>
    </div>
    <div id="scope-row" class="scope-row disabled">
      <input id="scope-check" type="checkbox" />
      <label for="scope-check">Scoped to <span id="scope-ancestor-name" class="ancestor-name">—</span></label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Tagged Components <span id="tag-count" class="tag-count"></span></div>
    <div class="tag-toolbar">
      <input id="tag-search-input" type="text" placeholder="Filter by name..." />
      <select id="tag-sort-select">
        <option value="name">A → Z</option>
        <option value="layer">Layer order</option>
      </select>
    </div>
    <div id="tag-list" class="tag-list">
      <div class="empty">No tagged components yet</div>
    </div>
  </div>
</div>

<script>
  const selectedInfo = document.getElementById('selected-info');
  const tagSection = document.getElementById('tag-section');
  const tagInput = document.getElementById('tag-input');
  const tagBtn = document.getElementById('tag-btn');
  const tagList = document.getElementById('tag-list');
  const tagSearchInput = document.getElementById('tag-search-input');
  const tagSortSelect = document.getElementById('tag-sort-select');
  const tagCount = document.getElementById('tag-count');
  const scopeRow = document.getElementById('scope-row');
  const scopeCheck = document.getElementById('scope-check');
  const scopeAncestorName = document.getElementById('scope-ancestor-name');

  let currentNodeId = null;
  let currentAncestor = null;
  let allTags = [];

  tagBtn.onclick = () => {
    const name = tagInput.value.trim();
    if (!name || !currentNodeId) return;
    const scoped = scopeCheck.checked && !!currentAncestor;
    parent.postMessage({ pluginMessage: { type: 'tag', nodeId: currentNodeId, name, scoped } }, '*');
    tagInput.value = '';
  };

  tagInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tagBtn.click();
  });

  tagSearchInput.addEventListener('input', () => {
    renderTagList(tagSearchInput.value);
  });

  tagSortSelect.addEventListener('change', () => {
    renderTagList(tagSearchInput.value);
  });

  function renderTagList(query) {
    if (allTags.length === 0) {
      tagList.innerHTML = '<div class="empty">No tagged components yet</div>';
      return;
    }
    const q = query.trim().toLowerCase();
    const filtered = q
      ? allTags.filter(t => t.componentName.toLowerCase().includes(q) || t.nodeName.toLowerCase().includes(q))
      : allTags;

    if (filtered.length === 0) {
      tagList.innerHTML = '<div class="empty">No matches</div>';
      return;
    }

    const sortByName = tagSortSelect.value === 'name';
    const topLevel = filtered.filter(t => !t.scopeParentId);
    const scoped = filtered.filter(t => !!t.scopeParentId);
    const scopeMap = {};
    for (const t of scoped) {
      if (!scopeMap[t.scopeParentId]) scopeMap[t.scopeParentId] = [];
      scopeMap[t.scopeParentId].push(t);
    }

    if (sortByName) {
      topLevel.sort((a, b) => a.componentName.localeCompare(b.componentName));
    }

    let html = '';

    if (!sortByName) {
      const groups = [];
      const groupMap = {};
      for (const t of topLevel) {
        const key = t.topLevelLayerName || '(unknown)';
        if (!groupMap[key]) {
          groupMap[key] = [];
          groups.push(key);
        }
        groupMap[key].push(t);
      }
      for (const group of groups) {
        html += `<div class="tag-group-header">${group}</div>`;
        for (const t of groupMap[group]) {
          html += renderTagItem(t, false);
          const children = scopeMap[t.nodeId] || [];
          for (const c of children) {
            html += renderTagItem(c, true);
          }
        }
      }
    } else {
      for (const t of topLevel) {
        html += renderTagItem(t, false);
        const children = scopeMap[t.nodeId] || [];
        children.sort((a, b) => a.componentName.localeCompare(b.componentName));
        for (const c of children) {
          html += renderTagItem(c, true);
        }
      }
    }

    const orphanScoped = scoped.filter(t => !topLevel.some(p => p.nodeId === t.scopeParentId));
    if (sortByName) orphanScoped.sort((a, b) => a.componentName.localeCompare(b.componentName));
    for (const t of orphanScoped) {
      html += renderTagItem(t, true);
    }

    tagList.innerHTML = html;
    tagList.querySelectorAll('.info').forEach(el => {
      el.onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'navigate', nodeId: el.dataset.id } }, '*');
      };
    });
    tagList.querySelectorAll('.remove').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        parent.postMessage({ pluginMessage: { type: 'remove-tag', nodeId: el.dataset.id } }, '*');
      };
    });
  }

  function renderTagItem(t, isScoped) {
    const scopedClass = isScoped ? ' scoped' : '';
    const scopeLabel = isScoped ? '<span class="scope-label">scoped</span>' : '';
    return `
      <div class="tag-item${scopedClass}">
        <span class="info" data-id="${t.nodeId}"><span class="node-name">${t.nodeName}</span> → <span class="component-name">${t.componentName}</span>${scopeLabel}</span>
        <span class="remove" data-id="${t.nodeId}">✕</span>
      </div>
    `;
  }

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'selection') {
      if (msg.node) {
        currentNodeId = msg.node.id;
        currentAncestor = msg.node.ancestor;
        const tagHtml = msg.node.tag
          ? `<div class="current-tag">Tagged as: ${msg.node.tag}${msg.node.scoped ? ' (scoped)' : ''}</div>`
          : '';
        selectedInfo.innerHTML = `
          <div class="selected-node">
            <div class="name">${msg.node.name}</div>
            <div class="type">${msg.node.type} · ${msg.node.id}</div>
            ${tagHtml}
            <div class="actions">
              <button type="button" class="btn-small" id="goto-btn">Go to node</button>
            </div>
          </div>
        `;
        document.getElementById('goto-btn').onclick = () => {
          parent.postMessage({ pluginMessage: { type: 'navigate', nodeId: currentNodeId } }, '*');
        };
        tagSection.style.display = '';
        tagInput.value = msg.node.tag || '';
        if (currentAncestor) {
          scopeRow.classList.remove('disabled');
          scopeAncestorName.textContent = currentAncestor.componentName;
          scopeCheck.checked = !!msg.node.scoped;
        } else {
          scopeRow.classList.add('disabled');
          scopeAncestorName.textContent = '(no tagged parent)';
          scopeCheck.checked = false;
        }
        tagInput.focus();
      } else {
        currentNodeId = null;
        currentAncestor = null;
        selectedInfo.innerHTML = '<div class="no-selection">Select a node in Figma</div>';
        tagSection.style.display = 'none';
        scopeRow.classList.add('disabled');
        scopeCheck.checked = false;
      }
    }

    if (msg.type === 'tag-list') {
      allTags = msg.tags;
      tagCount.textContent = allTags.length > 0 ? `(${allTags.length})` : '';
      renderTagList(tagSearchInput.value);
    }
  };

  parent.postMessage({ pluginMessage: { type: 'init' } }, '*');
</script>
